                    return;
                }
                if (!currentCircleId || !supervisorCircles.some(c => c.id === currentCircleId)) {
                    currentCircleId = supervisorCircles[0].id;
                }
            }

            const circle = CIRCLES.find(c => c.id === currentCircleId);
            if (!circle) { showToast('الرجاء اختيار حلقة أولاً', 'warning'); return; }

            if (currentUser.role === 'supervisor' && !canSupervisorAccessCircle(circle.id)) {
                showToast('لا يمكنك الوصول إلى هذه الحلقة', 'error');
                return;
            }

            const semData = getCircleSemesterData(circle.id, currentSemesterId);
            if (!semData) { showToast('بيانات الفصل غير موجودة', 'error'); return; }

            const today = new Date();
            const thirtyDaysAgo = new Date(today);
            thirtyDaysAgo.setDate(today.getDate() - 30);
            const fromDate = thirtyDaysAgo.toISOString().split('T')[0];
            const toDate = today.toISOString().split('T')[0];

            document.body.insertAdjacentHTML('beforeend', `
                    <div id="statsModal" class="modal" style="display:flex">
                        <div class="modal-content" style="max-width:800px;max-height:85vh;overflow-y:auto;">
                            <div class="modal-header"><h3><i class="fas fa-chart-bar"></i> 📊 الإحصائية الذكية - ${circle.name}</h3><button class="modal-close-btn" onclick="closeModal('statsModal')"><i class="fas fa-times"></i></button></div>
                            <div style="font-size:0.7rem;color:#666;margin-bottom:8px;text-align:center;">📅 الفصل: ${getSemesterName(currentSemesterId)}</div>
                            <div class="filter-row">
                                <div class="filter-group"><label>📅 من تاريخ</label><input type="date" id="statsFromDate" value="${fromDate}"></div>
                                <div class="filter-group"><label>📅 إلى تاريخ</label><input type="date" id="statsToDate" value="${toDate}"></div>
                                <div class="filter-group" style="flex:0 0 auto;"><button class="btn-primary" onclick="calculateStats()" style="padding:6px 16px;"><i class="fas fa-calculator"></i> عرض</button></div>
                                <div class="filter-group" style="flex:0 0 auto;"><button class="btn-success" onclick="printStatsPage()" style="padding:6px 16px;"><i class="fas fa-print"></i> طباعة</button></div>

                        </div>
                    </div>
                `);
        }

        // ==================== دالة حساب الإحصائية المُحسّنة ====================
        function calculateStats() {
            const fromDateStr = document.getElementById('statsFromDate')?.value;
            const toDateStr = document.getElementById('statsToDate')?.value;
            const circle = CIRCLES.find(c => c.id === currentCircleId);

            // --- التحقق من صحة المدخلات ---
            if (!fromDateStr || !toDateStr) {
                showToast('⚠️ الرجاء اختيار تاريخ البداية والنهاية', 'warning');
                return;
            }
            if (fromDateStr > toDateStr) {
                showToast('❌ تاريخ البداية لا يمكن أن يكون بعد تاريخ النهاية', 'error');
                return;
            }
            if (!circle) {
                showToast('⚠️ الحلقة غير موجودة', 'error');
                return;
            }

            // تحويل تواريخ الإدخال إلى كائنات Date مع ضبط الوقت لتجنب مشاكل المنطقة الزمنية
            const fromDate = new Date(fromDateStr + 'T00:00:00');
            const toDate = new Date(toDateStr + 'T23:59:59');

            if (isNaN(fromDate.getTime()) || isNaN(toDate.getTime())) {
                showToast('❌ تاريخ غير صالح', 'error');
                return;
            }

            const semData = getCircleSemesterData(circle.id, currentSemesterId);
            if (!semData) {
                showToast('⚠️ بيانات الفصل غير موجودة', 'error');
                return;
            }

            // --- تصفية البيانات حسب التاريخ ---
            // استخدام الدالة المعدلة parseReportDate لتحويل تواريخ التقارير
            const reportsInRange = semData.reports.filter(r => {
                const reportDate = parseReportDate(r.date);
                return reportDate && reportDate >= fromDate && reportDate <= toDate;
            });

            // تحويل تواريخ النقاط والسبر بنفس الطريقة
            const pointsInRange = semData.pointsHistory.filter(p => {
                const pointDate = parseReportDate(p.date);
                return pointDate && pointDate >= fromDate && pointDate <= toDate;
            });

            const sabrInRange = semData.sabrRecords.filter(r => {
                const sabrDate = parseReportDate(r.date);
                return sabrDate && sabrDate >= fromDate && sabrDate <= toDate;
            });

            // --- حساب الإحصائيات ---
            const totalReports = reportsInRange.length;
            const totalPoints = pointsInRange.reduce((sum, p) => sum + (p.points || 0), 0);
            const avgPoints = totalReports > 0 ? (totalPoints / totalReports) : 0;
            const totalSabr = sabrInRange.length;

            // حساب الحضور والغياب والتأخير
            let present = 0, absent = 0, late = 0;
            let totalAttendanceDays = 0;
            reportsInRange.forEach(r => {
                if (r.students && r.students.length > 0) {
                    r.students.forEach(s => {
                        if (s.attendance === 'present') present++;
                        else if (s.attendance === 'absent') absent++;
                        else if (s.attendance === 'late') late++;
                    });
                    totalAttendanceDays++;
                }
            });

            const totalAtt = present + absent + late;

            // حساب عدد صفحات التسميع
            let totalRecitationPages = 0;
            reportsInRange.forEach(r => {
                if (r.students) {
                    r.students.forEach(s => {
                        if (s.recitations) {
                            s.recitations.forEach(rec => {
                                if (rec.type === 'recitation' && rec.page) {
                                    const pageNum = parseInt(rec.page, 10);
                                    if (!isNaN(pageNum)) totalRecitationPages += pageNum;
                                }
                            });
                        }
                    });
                }
            });

            // --- إحصائيات كل طالب ---
            const studentStats = {};
            if (semData.students) {
                semData.students.forEach(st => {
                    const sp = pointsInRange.filter(p => p.studentId === st.id);
                    const sr = reportsInRange.filter(r => r.students && r.students.some(s => s.id === st.id));
                    const absentDays = reportsInRange.filter(r => {
                        if (!r.students) return false;
                        const s = r.students.find(s2 => s2.id === st.id);
                        return s && s.attendance === 'absent';
                    }).length;

                    let studentPages = 0;
                    reportsInRange.forEach(r => {
                        if (!r.students) return;
                        const s = r.students.find(s2 => s2.id === st.id);
                        if (s && s.recitations) {
                            s.recitations.forEach(rec => {
                                if (rec.type === 'recitation' && rec.page) {
                                    const pageNum = parseInt(rec.page, 10);
                                    if (!isNaN(pageNum)) studentPages += pageNum;
                                }
                            });
                        }
                    });

                    const ss = sabrInRange.filter(r => r.studentId === st.id).length;
                    studentStats[st.id] = {
                        name: st.name,
                        totalPoints: sp.reduce((sum, p) => sum + (p.points || 0), 0),
                        reportCount: sr.length,
                        attendance: sr.length - absentDays,
                        absentDays: absentDays,
                        recitationPages: studentPages,
                        sabrCount: ss,
                        totalDays: sr.length
                    };
                });
            }
            const sorted = Object.values(studentStats).sort((a, b) => b.totalPoints - a.totalPoints);

            // نسبة الحضور الإجمالية
            const totalPossibleAttendance = (semData.students ? semData.students.length : 0) * totalAttendanceDays;
            const totalActualAttendance = present;
            const attendancePercentage = totalPossibleAttendance > 0 ? Math.round((totalActualAttendance / totalPossibleAttendance) * 100) : 0;

            // --- عرض النتائج ---
            let html = `
                    <div id="statsPrintArea" style="padding:8px;">
                        <div style="text-align:center;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #1a5d2e;">
                            <h2 style="color:#1a5d2e;">🕌 جامع العمري</h2>
                            <h3>📊 الإحصائية الذكية - ${circle.name}</h3>
                            <p>📅 ${fromDateStr} إلى ${toDateStr}</p>
                            <p style="font-size:0.7rem;color:#888;">📅 الفصل: ${getSemesterName(currentSemesterId)}</p>
                        </div>
                        <div class="stats-cards">
                            <div class="stats-card"><span class="icon">📋</span><div class="number">${totalReports}</div><div class="label">عدد التقارير</div></div>
                            <div class="stats-card"><span class="icon">⭐</span><div class="number">${totalPoints}</div><div class="label">إجمالي النقاط</div></div>
                            <div class="stats-card"><span class="icon">📊</span><div class="number">${avgPoints.toFixed(1)}</div><div class="label">متوسط النقاط</div></div>
                            <div class="stats-card"><span class="icon">📖</span><div class="number">${totalSabr}</div><div class="label">عدد السبرات</div></div>

            if (reportsInRange.length > 0) {
                html += `

                            <h4 style="margin-bottom:8px;">📋 التقارير في الفترة</h4>

        function exportStatsPDF() {
            const content = document.getElementById('statsPrintArea');

            const fromDate = document.getElementById('statsFromDate')?.value;
            const toDate = document.getElementById('statsToDate')?.value;
            const circle = CIRCLES.find(c => c.id === currentCircleId);
            if (!circle) return;

            const opt = {
                margin: [8, 8, 8, 8],
                filename: `إحصائية_${circle.name}_${fromDate}_إلى_${toDate}_${getSemesterName(currentSemesterId)}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(content).save()

            if (!confirm('هل أنت متأكد من حذف هذا الخبر؟')) return;
            circleNews = circleNews.filter(n => n.id !== newsId);
            saveAll();
            showToast('✅ تم حذف الخبر');
            showCircleNews();

            const title = document.getElementById('newsTitle')?.value.trim();
            const content = document.getElementById('newsContent')?.value.trim();
            if (!title) { showToast('⚠️ الرجاء إدخال عنوان الخبر', 'warning'); return; }

            circleNews.unshift({

                content,

                author: currentUser.name,
                semesterId: currentSemesterId
            });

            showToast('✅ تم نشر الخبر');
            closeModal('addNewsModal');

        function showStudentSabr(studentId, studentName) {
            const studentSabr = sabrRecords.filter(r => r.studentId === studentId && r.semesterId === currentSemesterId);
            if (studentSabr.length === 0) {
                showToast('لا توجد سبرات مسجلة لهذا الطالب في هذا الفصل', 'info');
                return;
            }

            const evalLabels = { 'excellent': 'ممتاز', 'good': 'جيد جداً', 'fair': 'جيد', 'medium': 'جيد', 'weak': 'ضعيف' };
            let html = studentSabr.slice().reverse().map(r => {
                const markClass = r.evaluation === 'excellent' ? 'good' : (r.evaluation === 'good' ? 'medium' :
                    'weak');
                const typeLabel = r.sabrType === 'surah' ? '📖 سبر سورة' : '📚 سبر جزء';
                const typeBadgeClass = r.sabrType === 'surah' ? '' : 'juz';
                return `
                        <div class="sabr-record">
                            <div><strong>${typeLabel} ${r.surah}</strong> <span class="sabr-type-badge ${typeBadgeClass}">${r.sabrType === 'surah' ? 'سورة' : 'جزء'}</span></div>

        // ==================== دالة إنشاء الشهادة المُحسّنة ====================
        function generateCertificate() {
            const studentSelect = document.getElementById('certStudentSelect');
            const studentNameInput = document.getElementById('certStudentName');
            const circleSelect = document.getElementById('certCircleSelect');
            const circleNameInput = document.getElementById('certCircleName');
            const achievementInput = document.getElementById('certAchievement');
            const teacherSelect = document.getElementById('certTeacherSelect');
            const teacherNameInput = document.getElementById('certTeacherName');
            const supervisorSelect = document.getElementById('certSupervisorSelect');
            const supervisorNameInput = document.getElementById('certSupervisorName');
            const dateInput = document.getElementById('certDate');

            let studentName = studentNameInput.value.trim();
            if (!studentName && studentSelect.selectedIndex > 0) {
                studentName = studentSelect.options[studentSelect.selectedIndex].text.split(' (')[0];
            }

            let circleName = circleNameInput.value.trim();
            if (!circleName && circleSelect.selectedIndex > 0) {
                circleName = circleSelect.options[circleSelect.selectedIndex].text;
            }

            let teacherName = teacherNameInput.value.trim();
            if (!teacherName && teacherSelect.selectedIndex > 0) {
                teacherName = teacherSelect.options[teacherSelect.selectedIndex].text;
            }

            let supervisorName = supervisorNameInput.value.trim();
            if (!supervisorName && supervisorSelect.selectedIndex > 0) {
                supervisorName = supervisorSelect.options[supervisorSelect.selectedIndex].text;
            }

            const achievement = achievementInput ? achievementInput.value.trim() : '';
            const date = dateInput ? dateInput.value.trim() : '';

            const errors = [];
            if (!studentName) errors.push('⚠️ اسم الطالب');
            if (!circleName) errors.push('⚠️ اسم الحلقة/الصف');
            if (!teacherName) errors.push('⚠️ اسم المعلم');
            if (!supervisorName) errors.push('⚠️ اسم المدير');
            if (!achievement) errors.push('⚠️ الإنجاز');
            if (!date) errors.push('⚠️ التاريخ');

            if (errors.length > 0) {
                showToast(`❌ الرجاء ملء الحقول التالية:\n${errors.join('\n')}`, 'error');
                return;
            }

            const certEntry = {
                id: Date.now(),
                studentName,
                circleName,
                teacherName,
                supervisorName,
                achievement,
                date,
                semesterId: currentSemesterId,
                semesterName: getSemesterName(currentSemesterId),
                createdAt: new Date().toLocaleString('ar-EG')
            };
            certificatesArchive.push(certEntry);
            saveAll();

            closeModal('certificateModal');
            showToast('✅ تم إنشاء الشهادة بنجاح!', 'success');
            showCertificateView(certEntry);
        }

        async function downloadCertificatePDF() {
            const container = document.querySelector('.certificate-container');
            if (!container) { showToast('الرجاء عرض الشهادة أولاً', 'error'); return; }

            showToast('جاري تحضير ملف PDF...', 'info');

            const opt = {
                margin: [5, 5, 5, 5],
                filename: `شهادة_${document.querySelector('.cert-student-name')?.textContent || 'طالب'}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, backgroundColor: '#ffffff', letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            try {
                const element = container.cloneNode(true);
                element.style.boxShadow = 'none';
                element.style.margin = '0 auto';
                element.style.width = '100%';
                element.style.maxWidth = '210mm';

                const style = document.createElement('style');
                style.textContent = `
                    .certificate-container { 
                        border: 12px double #b5944b !important;
                        background: #fdfcf7 !important;
                        padding: 20px !important;
                        margin: 0 auto !important;
                        box-shadow: none !important;
                    }
                    .certificate-inner-border {
                        border: 3px solid #b5944b !important;
                        padding: 20px !important;
                    }
                `;
                element.appendChild(style);

                await html2pdf().set(opt).from(element).save();
                showToast('📄 تم تحميل الشهادة PDF بنجاح', 'success');
            } catch (error) {
                showToast('حدث خطأ في إنشاء PDF', 'error');
                console.error(error);
            }
        }

        function renderStudentsList(circle) {
            const container = document.getElementById('studentsListContainer');
            if (!container) return;
            
            const semData = getCircleSemesterData(circle.id, currentSemesterId);
            if (!semData || !semData.students || semData.students.length === 0) {
                container.innerHTML = '<p style="text-align:center;padding:16px;color:#888;">لا يوجد طلاب في هذا الفصل</p>';
                return;
            }
            
            container.innerHTML = semData.students.map(s => {
                const studentSabr = semData.sabrRecords.filter(r => r.studentId === s.id).length;
                return `
                        <div class="student-card">
                            <div class="student-name"><span><i class="fas fa-child"></i> ${s.name}</span><span class="student-points">⭐ ${s.totalPoints} نقطة</span></div>
                            <div class="student-details"><span>📞 ${s.parentPhone}</span><span>👨‍👩‍👧 ${s.parentName}</span><span>📖 سبر: ${studentSabr}</span></div>
                            <div class="student-actions">
                                <button class="btn-info" onclick="showStudentAchievements(${s.id},'${s.name}')"><i class="fas fa-chart-line"></i> إنجازات</button>
                                ${canModifyData() ? `
                                <button class="btn-quick-points" onclick="showQuickAddPoints(${circle.id},${s.id},'${s.name}')"><i class="fas fa-star"></i> نقاط</button>
                                <button class="btn-quick-recitation" onclick="showQuickRecitation(${circle.id},${s.id},'${s.name}')"><i class="fas fa-microphone-alt"></i> تسميع</button>
                                <button class="btn-quick-sabr" onclick="showQuickSabr(${circle.id},${s.id},'${s.name}')"><i class="fas fa-book-open"></i> سبر</button>
                                ` : ''}
                                ${(currentUser.role==='admin'||(currentUser.role==='teacher'&&circle.teacherId===currentUser.teacherId)||(currentUser.role==='supervisor'&&CATEGORIES.find(c=>c.id===circle.categoryId)?.supervisorId===currentUser.supervisorId)) && canModifyData() ? `
                                <button class="btn-danger" onclick="removeStudentFromCircle(${circle.id},${s.id})"><i class="fas fa-trash"></i> إزالة</button>
                                <button class="btn-warning" onclick="showEditStudentCircle(${circle.id},${s.id})"><i class="fas fa-edit"></i> تعديل</button>` : ''}
                                <button class="btn-purple" onclick="showStudentSabr(${s.id},'${s.name}')"><i class="fas fa-book-open"></i> السبر</button>
                            </div>
                        </div>
                    `;
            }).join('');
        }

        // ==================== صفحة تسجيل الدخول ====================
        function showLoginPage() {
            document.getElementById('app').innerHTML = `
                    <div class="login-container">
                        <div class="login-card">
                            <div class="login-logo">🕌</div>
                            <h2 class="login-title">جامع العمري</h2>
                            <p class="login-subtitle">نظام إدارة حلقات القرآن الكريم المتقدم v2.0</p>
                            <div class="login-tabs"><div class="login-tab active" data-tab="teacher">👨‍🏫 معلم / مشرف / مدير</div><div class="login-tab" data-tab="student">📞 طالب (الاسم + رقم الهاتف)</div></div>
                            <form id="loginForm">
                                <div id="teacherLogin">
                                    <div class="login-form-group"><label><i class="fas fa-user"></i> اسم المستخدم</label><input type="text" id="loginUsername" placeholder="أدخل اسم المستخدم" autocomplete="off"></div>
                                    <div class="login-form-group"><label><i class="fas fa-lock"></i> كلمة المرور</label><input type="password" id="loginPassword" placeholder="أدخل كلمة المرور"></div>
                                </div>
                                <div id="studentLogin" style="display:none;">
                                    <div class="login-form-group"><label><i class="fas fa-user"></i> اسم الطالب <span style="color:red;">*</span></label><input type="text" id="loginStudentName" placeholder="أدخل اسم الطالب" autocomplete="off"></div>
                                    <div class="login-form-group"><label><i class="fas fa-phone"></i> رقم هاتف ولي الأمر <span style="color:red;">*</span></label><input type="tel" id="loginPhone" placeholder="أدخل رقم الهاتف" autocomplete="off"></div>
                                    <div style="background:#f8f9fa;padding:8px;border-radius:6px;margin-top:8px;font-size:0.65rem;color:#666;text-align:center;">
                                        <i class="fas fa-info-circle"></i> يجب إدخال الاسم ورقم الهاتف معاً لتسجيل الدخول
                                    </div>
                                </div>
                                <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> دخول</button>
                            </form>
                            <div class="info-box">
                                <h4><i class="fas fa-info-circle"></i> معلومات الدخول:</h4>
                                <p><strong>👨‍💼 مدير:</strong> admin / admin123</p>
                                <p><strong>👨‍🏫 معلم:</strong> ahmed / 123456</p>
                                <p><strong>👩‍💼 مشرف:</strong> supervisor / 123456</p>
                                <p><strong>📞 طالب:</strong> 0599123456 (خالد أحمد), 0599988777 (عمر سعيد), 0599111222 (يوسف علي)</p>
                                <p style="margin-top:6px;font-size:0.6rem;color:#888;">يجب إدخال اسم الطالب ورقم الهاتف معاً</p>
                            </div>
                        </div>
                    </div>
                `;

            document.querySelectorAll('.login-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById('teacherLogin').style.display = this.dataset.tab === 'teacher' ?
                        'block' : 'none';
                    document.getElementById('studentLogin').style.display = this.dataset.tab === 'student' ?
                        'block' : 'none';
                });
            });

            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const isTeacher = document.querySelector('.login-tab.active').dataset.tab === 'teacher';

                if (isTeacher) {
                    const username = document.getElementById('loginUsername').value.toLowerCase().trim();
                    const password = document.getElementById('loginPassword').value;
                    const user = USERS.find(u => u.username === username && u.password === password);
                    if (user) {
                        currentUser = { ...user };
                        delete currentUser.password;
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));
                        if (user.role === 'teacher' && user.teacherId) {
                            const c = CIRCLES.find(c2 => c2.teacherId === user.teacherId);
                            if (c) currentCircleId = c.id;
                        }
                        if (user.role === 'supervisor' && user.supervisorId) {
                            const supervisorCircles = CIRCLES.filter(c => {
                                const cat = CATEGORIES.find(cat => cat.id === c.categoryId);
                                return cat && cat.supervisorId === user.supervisorId;
                            });
                            if (supervisorCircles.length > 0) currentCircleId = supervisorCircles[0].id;
                        }
                        const active = getActiveSemester();
                        if (active) currentSemesterId = active.id;
                        else if (ACADEMIC_SEMESTERS.length > 0) currentSemesterId = ACADEMIC_SEMESTERS[0].id;
                        showDashboard();
                        showToast(`مرحباً ${currentUser.name}`);
                    } else showToast('بيانات الدخول غير صحيحة', 'error');
                } else {
                    const phone = document.getElementById('loginPhone').value.trim();
                    const name = document.getElementById('loginStudentName').value.trim();
                    
                    if (!phone) { showToast('الرجاء إدخال رقم الهاتف', 'warning'); return; }
                    if (!name) { showToast('الرجاء إدخال اسم الطالب', 'warning'); return; }

                    let found = null,
                        foundCircle = null;
                    for (const circle of CIRCLES) {
                        const semData = getCircleSemesterData(circle.id, currentSemesterId);
                        if (semData) {
                            let s = semData.students?.find(st => st.parentPhone === phone && st.name === name);
                            if (s) { found = s;
                                foundCircle = circle; break; }
                        }
                    }
                    if (found) {
                        let user = USERS.find(u => u.studentId === found.id);
                        if (!user) {
                            const newId = USERS.length > 0 ? Math.max(...USERS.map(u => u.id)) + 1 : 7;
                            user = { id: newId, username: `student_${found.id}`, password: phone,
                                role: 'student', name: found.name, studentId: found.id };
                            USERS.push(user);
                            saveAll();
                        }
                        currentUser = { ...user };
                        delete currentUser.password;
                        currentCircleId = foundCircle.id;
                        const active = getActiveSemester();
                        if (active) currentSemesterId = active.id;
                        else if (ACADEMIC_SEMESTERS.length > 0) currentSemesterId = ACADEMIC_SEMESTERS[0].id;
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));
                        showDashboard();
                        showToast(`مرحباً ${found.name}`);
                    } else {
                        showToast('❌ البيانات غير صحيحة - تأكد من اسم الطالب ورقم الهاتف', 'error');
                    }
                }
            });
        }

        // ==================== وظائف الطباعة والتصدير ====================
        function printReportAsPDF(report) {
            if (!report) { showToast('لا يوجد تقرير', 'error'); return; }
            const win = window.open('', '_blank');
            if (!win) { showToast('الرجاء السماح بالنوافذ المنبثقة', 'error'); return; }
            
            let studentsHtml = '';
            if (report.students && report.students.length > 0) {
                report.students.forEach(s => {
                    let recText = '';
                    if (s.recitations && s.recitations.length > 0) {
                        recText = s.recitations.map(r => {
                            if (r.type === 'sabr') {
                                const typeLabel = r.sabrType === 'surah' ? 'سبر سورة' : 'سبر جزء';
                                const evalLabels = { 'excellent': 'ممتاز', 'good': 'جيد جداً', 'fair': 'جيد', 'medium': 'جيد', 'weak': 'ضعيف' };
                                return `${typeLabel} ${r.surah} - ${evalLabels[r.evaluation]||r.evaluation}${r.notes ? ' 📝' + r.notes : ''} (${r.points} نقطة)`;
                            } else {
                                const evalLabels = { 'excellent': 'ممتاز', 'good': 'جيد جداً', 'fair': 'جيد', 'weak': 'يحتاج تحسين' };
                                return `تسميع ${r.surah} (ص${r.page}) - ${evalLabels[r.evaluation]||r.evaluation} (${r.points} نقطة)`;
                            }
                        }).join('<br>');
                    } else { recText = '—'; }
                    
                    const attPoints = getAttendancePoints(s.attendance);
                    const attPointsLabel = attPoints > 0 ? `+${attPoints}` : (attPoints < 0 ? attPoints : '0');
                    
                    studentsHtml += `
                        <tr><td style="padding:5px;">${s.name}</td>
                        <td style="padding:5px;text-align:center;">${s.attendance === 'present' ? '✅ حاضر' : (s.attendance === 'absent' ? '❌ غائب' : '⏰ متأخر')} (${attPointsLabel})</td>
                        <td style="padding:5px;text-align:right;font-size:0.7rem;">${recText}</td>
                        <td style="padding:5px;text-align:center;">${s.assignment || '—'}</td>
                        <td style="padding:5px;text-align:center;font-weight:bold;">${s.totalPoints || 0}</td></tr>
                    `;
                });
            } else {
                studentsHtml = `<tr><td colspan="5" style="text-align:center;padding:10px;color:#888;">لا توجد بيانات للطلاب</td></tr>`;
            }

            win.document.write(`
                <html dir="rtl"><head><meta charset="UTF-8"><title>تقرير - ${report.date}</title>
                <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
                <style>
                    body{font-family:'Cairo',sans-serif;padding:16px;background:white;direction:rtl;font-size:14px;}
                    .report-header{text-align:center;margin-bottom:16px;border-bottom:2px solid #1a5d2e;padding-bottom:8px;}
                    .report-header h2{color:#1a5d2e;margin:0;}
                    .report-header p{margin:4px 0;color:#666;font-size:0.8rem;}
                    table{width:100%;border-collapse:collapse;margin:8px 0;font-size:0.75rem;}
                    th{background:#1a472a;color:white;padding:6px;border:1px solid #1a472a;}
                    td{padding:5px;border:1px solid #ddd;text-align:center;}
                    .footer{text-align:center;margin-top:16px;font-size:0.6rem;color:#888;border-top:1px solid #eee;padding-top:8px;}
                    .no-print{text-align:center;margin-top:16px;padding:16px;}
                    @media print{body{padding:0;}.no-print{display:none;}}
                </style>
                </head><body>
                <div class="report-header">
                    <h2>🕌 جامع العمري - تقرير يومي</h2>
                    <p>${report.circle} - ${report.day || ''} ${report.date}</p>
                    <p style="font-size:0.7rem;color:#888;">📅 الفصل: ${getSemesterName(report.semesterId || currentSemesterId)}</p>
                    <p style="font-size:0.65rem;color:#666;">👨‍🏫 المعلم: ${report.teacher || 'غير محدد'}</p>
                </div>
                <table>
                    <thead><tr><th>الطالب</th><th>الحضور</th><th>التسميع والسبر</th><th>الواجب</th><th>النقاط</th></tr></thead>
                    <tbody>${studentsHtml}</tbody>
                </table>
                <div class="footer">تم إنشاء هذا التقرير بواسطة نظام جامع العمري</div>
                <div class="no-print"><button onclick="window.print()" style="background:#1a5d2e;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;margin:4px;"><i class="fas fa-print"></i> طباعة</button><button onclick="window.close()" style="background:#e74c3c;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;margin:4px;"><i class="fas fa-times"></i> إغلاق</button></div>
                <script>
                    window.onload = function() {
                        setTimeout(function() { window.print(); }, 500);
                    };
                <\/script>
                </body></html>
            `);
            win.document.close();
        }

        function exportReportToPDF(report) {
            if (!report) { showToast('لا يوجد تقرير', 'error'); return; }

            let studentsHtml = '';
            if (report.students && report.students.length > 0) {
                report.students.forEach(s => {
                    let recText = '';
                    if (s.recitations && s.recitations.length > 0) {
                        recText = s.recitations.map(r => {
                            if (r.type === 'sabr') {
                                const typeLabel = r.sabrType === 'surah' ? 'سبر سورة' : 'سبر جزء';
                                const evalLabels = { 'excellent': 'ممتاز', 'good': 'جيد جداً', 'fair': 'جيد', 'medium': 'جيد', 'weak': 'ضعيف' };
                                return `${typeLabel} ${r.surah} - ${evalLabels[r.evaluation]||r.evaluation}${r.notes ? ' 📝' + r.notes : ''} (${r.points} نقطة)`;
                            } else {
                                const evalLabels = { 'excellent': 'ممتاز', 'good': 'جيد جداً', 'fair': 'جيد', 'weak': 'يحتاج تحسين' };
                                return `تسميع ${r.surah} (ص${r.page}) - ${evalLabels[r.evaluation]||r.evaluation} (${r.points} نقطة)`;
                            }
                        }).join('<br>');
                    } else { recText = '—'; }
                    
                    const attPoints = getAttendancePoints(s.attendance);
                    const attPointsLabel = attPoints > 0 ? `+${attPoints}` : (attPoints < 0 ? attPoints : '0');
                    
                    studentsHtml += `
                        <tr><td style="padding:5px;">${s.name}</td>
                        <td style="padding:5px;text-align:center;">${s.attendance === 'present' ? '✅ حاضر' : (s.attendance === 'absent' ? '❌ غائب' : '⏰ متأخر')} (${attPointsLabel})</td>
                        <td style="padding:5px;text-align:right;font-size:0.7rem;">${recText}</td>
                        <td style="padding:5px;text-align:center;">${s.assignment || '—'}</td>
                        <td style="padding:5px;text-align:center;font-weight:bold;">${s.totalPoints || 0}</td></tr>
                    `;
                });
            } else {
                studentsHtml = `<tr><td colspan="5" style="text-align:center;padding:10px;color:#888;">لا توجد بيانات للطلاب</td></tr>`;
            }

            const reportHTML = `
                <div style="font-family:'Cairo',sans-serif;direction:rtl;padding:16px;background:white;max-width:800px;margin:0 auto;">
                    <div style="text-align:center;margin-bottom:16px;border-bottom:2px solid #1a5d2e;padding-bottom:8px;">
                        <h2 style="color:#1a5d2e;margin:0;">🕌 جامع العمري - تقرير يومي</h2>
                        <p style="margin:4px 0;color:#666;font-size:0.8rem;">${report.circle} - ${report.day || ''} ${report.date}</p>
                        <p style="font-size:0.7rem;color:#888;">📅 الفصل: ${getSemesterName(report.semesterId || currentSemesterId)}</p>
                        <p style="font-size:0.65rem;color:#666;">👨‍🏫 المعلم: ${report.teacher || 'غير محدد'}</p>
                    </div>
                    <table style="width:100%;border-collapse:collapse;margin:8px 0;font-size:0.75rem;">
                        <thead><tr style="background:#1a472a;color:white;"><th style="padding:6px;border:1px solid #1a472a;">الطالب</th><th style="padding:6px;border:1px solid #1a472a;">الحضور</th><th style="padding:6px;border:1px solid #1a472a;">التسميع والسبر</th><th style="padding:6px;border:1px solid #1a472a;">الواجب</th><th style="padding:6px;border:1px solid #1a472a;">النقاط</th></tr></thead>
                        <tbody>${studentsHtml}</tbody>
                    </table>
                    <div style="text-align:center;margin-top:16px;font-size:0.6rem;color:#888;border-top:1px solid #eee;padding-top:8px;">تم إنشاء هذا التقرير بواسطة نظام جامع العمري</div>
                </div>
            `;

            const opt = {
                margin: [8, 8, 8, 8],
                filename: `تقرير_${report.circle}_${report.date}_${getSemesterName(report.semesterId || currentSemesterId)}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            const element = document.createElement('div');
            element.innerHTML = reportHTML;
            document.body.appendChild(element);
            
            html2pdf().set(opt).from(element).save()
                .then(() => { showToast('📄 تم تحميل PDF', 'success'); element.remove(); })
                .catch(() => { showToast('حدث خطأ', 'error'); element.remove(); });
        }

        // ==================== تشغيل التطبيق ====================
        loadData();
        const active = getActiveSemester();
        if (!active && ACADEMIC_SEMESTERS.length > 0) {
            ACADEMIC_SEMESTERS[0].status = 'active';
            currentSemesterId = ACADEMIC_SEMESTERS[0].id;
        } else if (active) {
            currentSemesterId = active.id;
        } else {
            const newId = Date.now();
            ACADEMIC_SEMESTERS.push({
                id: newId,
                name: `فصل الخريف ${new Date().getFullYear()}`,
                status: 'active',
                startDate: new Date().toLocaleDateString('ar-EG'),
                endDate: '',
                createdAt: new Date().toISOString()
            });
            currentSemesterId = newId;
            CIRCLES.forEach(circle => {
                if (!circle.semesterData) circle.semesterData = {};
                if (!circle.semesterData[currentSemesterId]) {
                    circle.semesterData[currentSemesterId] = {
                        students: [],
                        reports: [],
                        pointsHistory: [],
                        sabrRecords: [],
                        studentAssignments: []
                    };
                }
            });
            saveAll();
        }

        const saved = localStorage.getItem('currentUser');
        if (saved) {
            try {
                currentUser = JSON.parse(saved);
                if (currentUser.role === 'teacher' && currentUser.teacherId) {
                    const c = CIRCLES.find(c2 => c2.teacherId === currentUser.teacherId);
                    if (c) currentCircleId = c.id;
                }
                if (currentUser.role === 'supervisor' && currentUser.supervisorId) {
                    const supervisorCircles = CIRCLES.filter(c => {
                        const cat = CATEGORIES.find(cat => cat.id === c.categoryId);
                        return cat && cat.supervisorId === currentUser.supervisorId;
                    });
                    if (supervisorCircles.length > 0) currentCircleId = supervisorCircles[0].id;
                }
                if (currentUser.role === 'student' && currentUser.studentId) {
                    for (const circle of CIRCLES) {
                        const semData = getCircleSemesterData(circle.id, currentSemesterId);
                        if (semData && semData.students?.some(s => s.id === currentUser.studentId)) {
                            currentCircleId = circle.id;
                            break;
                        }
                    }
                }
                showDashboard();
            } catch (e) { showLoginPage(); }
        } else showLoginPage();
    </script>
</body>
</html>
